name: Career market intel

on:
  schedule:
    # 北京时间 08:00 — 岗位雷达（每天）
    - cron: "0 0 * * *"
    # 北京时间 08:00 — 兼职风口（周一三五，UTC 日=0 一=1 … 五=5）
    - cron: "0 0 * * 1,3,5"
  workflow_dispatch:
    inputs:
      mode:
        description: "radar | scout | all"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - radar
          - scout

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r career/scripts/requirements.txt

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 0 * * 1,3,5" ]; then
            echo "value=scout" >> "$GITHUB_OUTPUT"
          else
            echo "value=radar" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch intel
        run: python career/scripts/fetch-intel.py "${{ steps.mode.outputs.value }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add career/data/radar-latest.json career/data/scout-latest.json radar-latest.json scout-latest.json career/market-radar/ career/opportunity-scout/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore(career): auto-update market intel (${{ steps.mode.outputs.value }})"
          git push
