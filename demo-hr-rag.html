<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 外呼 · 拉新召回脚本 Demo | Ada Liu</title>
  <meta name="description" content="海外游戏 AI 外呼：名单分层、活动脚本检索、拉新与流失召回话术演示。" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(139, 92, 246, 0.12), transparent 35%),
        radial-gradient(circle at top right, rgba(251, 191, 36, 0.1), transparent 30%),
        #f8fafc;
    }
    .glass {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 16px 48px rgba(15, 23, 42, 0.06);
    }
    .chat-scroll {
      max-height: 420px;
      overflow-y: auto;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-in { animation: fadeUp 0.35s ease both; }
  </style>
</head>
<body class="text-gray-900 min-h-screen">

  <header class="sticky top-0 z-40 bg-white/80 backdrop-blur border-b border-gray-100">
    <div class="max-w-6xl mx-auto px-5 py-4 flex flex-wrap items-center justify-between gap-3">
      <div>
        <a href="index.html#work" class="text-sm font-semibold text-violet-700 hover:underline">← 返回主页</a>
        <p class="mt-1 text-xs text-gray-500">海外游戏 · AI 外呼脚本检索 · 演示数据</p>
      </div>
      <span class="text-xs font-bold bg-violet-100 text-violet-800 px-3 py-1 rounded-full">外呼策略模拟</span>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-5 py-8 md:py-10">
    <div class="mb-8">
      <p class="text-sm font-bold text-violet-700 uppercase tracking-widest">Interactive Demo</p>
      <h1 class="mt-2 text-3xl md:text-4xl font-black tracking-tight">AI 外呼 · 拉新与流失召回</h1>
      <p class="mt-3 text-gray-600 leading-8 max-w-3xl">
        模拟外呼前<strong>名单分层 + 脚本检索</strong>：按市场、玩家分层、活动版本过滤话术库，再生成外呼要点（非长文客服回复）。
        用于对齐运营、风控、本地化对外呼内容的共识。
      </p>
    </div>

    <div class="grid lg:grid-cols-[320px_1fr] gap-6">
      <!-- 左侧：员工身份 + 版本 -->
      <aside class="glass rounded-2xl p-5 h-fit space-y-5">
        <div>
          <h2 class="font-bold text-sm text-gray-500 uppercase tracking-wider">名单分层</h2>
          <label class="block mt-3 text-sm font-semibold">市场</label>
          <select id="region" class="mt-1 w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm bg-white">
            <option value="SEA">东南亚 SEA</option>
            <option value="LATAM">拉美 LATAM</option>
            <option value="NA">北美 NA</option>
          </select>

          <label class="block mt-4 text-sm font-semibold">玩家分层</label>
          <select id="jobType" class="mt-1 w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm bg-white">
            <option value="new">新注册 · 未付费</option>
            <option value="churn7">流失 7 天</option>
            <option value="whale">大 R · 活跃下滑</option>
          </select>
        </div>

        <div class="border-t border-gray-100 pt-4">
          <h2 class="font-bold text-sm text-gray-500 uppercase tracking-wider">活动脚本</h2>
          <label class="mt-3 flex items-start gap-2 cursor-pointer">
            <input type="radio" name="versionMode" value="current" checked class="mt-1" />
            <span class="text-sm leading-6"><strong>仅当前活动话术</strong><br /><span class="text-gray-500">已下线活动不进入检索</span></span>
          </label>
          <label class="mt-3 flex items-start gap-2 cursor-pointer">
            <input type="radio" name="versionMode" value="all" class="mt-1" />
            <span class="text-sm leading-6"><strong>含已下线活动</strong><br /><span class="text-gray-500">对比误用旧脚本风险</span></span>
          </label>
        </div>

        <div class="rounded-xl bg-violet-50 border border-violet-100 p-3 text-xs text-violet-900 leading-6">
          <p class="font-bold">当前检索范围</p>
          <p id="filter-summary" class="mt-1"></p>
        </div>
      </aside>

      <!-- 右侧：对话 + 检索过程 -->
      <div class="space-y-4">
        <section class="glass rounded-2xl p-5 md:p-6">
          <div class="flex flex-wrap gap-2 mb-4">
            <span class="text-sm font-semibold text-gray-700 mr-1">试试问：</span>
            <button type="button" class="quick-q text-sm bg-white border border-gray-200 px-3 py-1.5 rounded-full hover:border-violet-300 hover:text-violet-800" data-q="7天未登录怎么召回？">7天未登录召回</button>
            <button type="button" class="quick-q text-sm bg-white border border-gray-200 px-3 py-1.5 rounded-full hover:border-violet-300 hover:text-violet-800" data-q="新注册未付费拉新话术">新注册拉新</button>
            <button type="button" class="quick-q text-sm bg-white border border-gray-200 px-3 py-1.5 rounded-full hover:border-violet-300 hover:text-violet-800" data-q="大R活跃下降关怀">大R关怀</button>
          </div>

          <div id="chat" class="chat-scroll space-y-4 pr-1">
            <div class="msg-in rounded-2xl bg-gray-100 px-4 py-3 text-sm text-gray-700 leading-7">
              你好，我是外呼脚本助手。请先选<strong>市场</strong>与<strong>玩家分层</strong>，再问拉新/召回话术；右侧可看本次命中的脚本片段（模拟检索日志）。
            </div>
          </div>

          <div class="flex flex-wrap gap-2 mb-3 text-xs">
            <button type="button" id="clear-chat" class="px-3 py-1.5 rounded-full border border-gray-200 hover:bg-gray-50">清空对话</button>
            <button type="button" id="copy-log-btn" class="px-3 py-1.5 rounded-full border border-violet-200 text-violet-700 hover:bg-violet-50">复制检索日志</button>
            <button type="button" id="compare-region" class="px-3 py-1.5 rounded-full border border-amber-200 text-amber-800 hover:bg-amber-50" title="同一召回意图，切换市场对比脚本">
              对比：SEA vs LATAM 召回脚本
            </button>
          </div>

          <form id="ask-form" class="mt-4 flex gap-2">
            <input
              id="question"
              type="text"
              placeholder="例如：7天未登录怎么召回？"
              class="flex-1 rounded-full border border-gray-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400"
              autocomplete="off"
            />
            <button type="submit" class="shrink-0 bg-gray-950 text-white px-5 py-3 rounded-full text-sm font-semibold hover:bg-gray-800">
              提问
            </button>
          </form>
        </section>

        <details class="glass rounded-2xl p-5 group" open>
          <summary class="cursor-pointer font-bold text-sm text-gray-800 select-none">
            检索过程（RAG 模拟日志）
            <span class="text-gray-400 font-normal ml-1">— 可见 metadata 过滤前后</span>
          </summary>
          <pre id="retrieval-log" class="mt-4 text-xs leading-6 text-gray-600 whitespace-pre-wrap break-words bg-gray-50 rounded-xl p-4 border border-gray-100">等待提问…</pre>
        </details>
      </div>
    </div>
  </main>

  <script>
    const KB = [
      {
        id: "sea-new-welcome-25",
        keywords: ["拉新", "新注册", "未付费", "首充"],
        region: "SEA",
        jobType: "new",
        version: "2025",
        effective: true,
        source: "Outbound/SEA/NewPlayer-Welcome · 2025-03",
        answer:
          "【SEA · 新注册未付费】开场 15 秒内说明身份与游戏名；强调新手 7 日礼包与首充双倍（勿承诺具体金额）；若玩家拒绝，记录「不感兴趣」并 7 日内不再外呼。",
      },
      {
        id: "sea-churn7-winback-25",
        keywords: ["召回", "流失", "7天", "未登录", "登录"],
        region: "SEA",
        jobType: "churn7",
        version: "2025",
        effective: true,
        source: "Outbound/SEA/Churn7-Winback · 2025-03",
        answer:
          "【SEA · 流失 7 天】先确认是否换设备/卸载；提供「回归登录礼」领取步骤（游戏内邮箱）；禁止口头承诺补偿钻石数量，引导回游戏查看活动页。",
      },
      {
        id: "latam-churn7-winback-25",
        keywords: ["召回", "流失", "7天", "未登录"],
        region: "LATAM",
        jobType: "churn7",
        version: "2025",
        effective: true,
        source: "Outbound/LATAM/Churn7-Winback · 2025-03",
        answer:
          "【LATAM · 流失 7 天】西语/葡语脚本需本地化称呼；强调赛季活动倒计时；若玩家提及充值问题，转客服工单号流程，外呼不处理到账。",
      },
      {
        id: "na-whale-care-25",
        keywords: ["大R", "关怀", "活跃", "下滑", "VIP"],
        region: "NA",
        jobType: "whale",
        version: "2025",
        effective: true,
        source: "Outbound/NA/Whale-Retention · 2025-03",
        answer:
          "【NA · 大 R 活跃下滑】语气尊重、不施压；邀请专属客服通道与版本前瞻；禁止讨论其他玩家数据；若提及退款/提现，立即转支付客服队列。",
      },
      {
        id: "sea-whale-care-25",
        keywords: ["大R", "关怀", "VIP", "活跃下降"],
        region: "SEA",
        jobType: "whale",
        version: "2025",
        effective: true,
        source: "Outbound/SEA/Whale-Retention · 2025-03",
        answer:
          "【SEA · 大 R】可提及公会/排位赛季节点；提供预约回电时段；外呼时长控制在 3 分钟内，挂断后推送 App 内消息卡片。",
      },
      {
        id: "sea-churn7-old-event-24",
        keywords: ["召回", "流失", "活动"],
        region: "SEA",
        jobType: "churn7",
        version: "2024",
        effective: false,
        source: "Outbound/SEA/2024-Summer-Event（已下线）",
        answer:
          "【⚠️ 已下线活动】2024 夏日返利口令已失效。若仍被命中，说明活动脚本过滤未生效，应改用当前赛季召回话术。",
      },
    ];

    const regionEl = document.getElementById("region");
    const jobTypeEl = document.getElementById("jobType");
    const filterSummary = document.getElementById("filter-summary");
    const chat = document.getElementById("chat");
    const logEl = document.getElementById("retrieval-log");
    const form = document.getElementById("ask-form");
    const questionEl = document.getElementById("question");

    function getVersionMode() {
      return document.querySelector('input[name="versionMode"]:checked').value;
    }

    function updateFilterSummary() {
      const r = regionEl.options[regionEl.selectedIndex].text;
      const j = jobTypeEl.options[jobTypeEl.selectedIndex].text;
      const v = getVersionMode() === "current" ? "仅当前活动话术" : "含已下线活动";
      filterSummary.textContent = `${r} · ${j} · ${v}`;
    }

    regionEl.addEventListener("change", updateFilterSummary);
    jobTypeEl.addEventListener("change", updateFilterSummary);
    document.querySelectorAll('input[name="versionMode"]').forEach((el) => {
      el.addEventListener("change", updateFilterSummary);
    });
    updateFilterSummary();

    const PREFS_KEY = "demo-hr-rag-prefs";
    try {
      const p = JSON.parse(localStorage.getItem(PREFS_KEY) || "{}");
      const validRegions = ["SEA", "LATAM", "NA"];
      const validSegments = ["new", "churn7", "whale"];
      if (p.region && validRegions.includes(p.region)) regionEl.value = p.region;
      if (p.jobType && validSegments.includes(p.jobType)) jobTypeEl.value = p.jobType;
      if (p.versionMode) {
        const radio = document.querySelector(`input[name="versionMode"][value="${p.versionMode}"]`);
        if (radio) radio.checked = true;
      }
      updateFilterSummary();
    } catch (_) {}

    function savePrefs() {
      localStorage.setItem(
        PREFS_KEY,
        JSON.stringify({ region: regionEl.value, jobType: jobTypeEl.value, versionMode: getVersionMode() })
      );
    }
    regionEl.addEventListener("change", savePrefs);
    jobTypeEl.addEventListener("change", savePrefs);
    document.querySelectorAll('input[name="versionMode"]').forEach((el) => el.addEventListener("change", savePrefs));

    function scoreChunk(chunk, question) {
      const q = question.toLowerCase();
      let score = 0;
      chunk.keywords.forEach((kw) => {
        if (question.includes(kw)) score += 3;
      });
      if (question.includes("召回") && chunk.keywords.includes("召回")) score += 2;
      if (question.includes("拉新") && chunk.keywords.includes("拉新")) score += 2;
      if (question.includes("大R") && chunk.keywords.includes("大R")) score += 2;
      return score;
    }

    function retrieve(question) {
      const region = regionEl.value;
      const jobType = jobTypeEl.value;
      const versionMode = getVersionMode();
      const lines = [];
      lines.push(`用户问题：${question}`);
      lines.push(`metadata：market=${region}, segment=${jobType}, scriptMode=${versionMode}`);
      lines.push("");

      let pool = [...KB];
      lines.push(`知识库总量：${pool.length} 片段`);
      lines.push("");

      const afterPermission = pool.filter((c) => c.region === region);
      lines.push(`① 市场过滤后：${afterPermission.length} 片段（仅保留 ${region}）`);
      pool = afterPermission;

      const afterJob = pool.filter((c) => c.jobType === jobType);
      lines.push(`② 玩家分层过滤后：${afterJob.length} 片段（仅保留 ${jobType}）`);
      pool = afterJob;

      if (versionMode === "current") {
        const afterTime = pool.filter((c) => c.effective);
        lines.push(`③ 活动时效过滤（仅 effective=true）：${afterTime.length} 片段`);
        pool = afterTime;
      } else {
        lines.push(`③ 时效过滤：已关闭，允许命中失效文档`);
      }

      const scored = pool
        .map((c) => ({ chunk: c, score: scoreChunk(c, question) }))
        .filter((x) => x.score > 0)
        .sort((a, b) => b.score - a.score);

      lines.push("");
      lines.push("④ 关键词召回排序：");
      if (scored.length === 0) {
        lines.push("   （无命中）");
      } else {
        scored.forEach((x, i) => {
          lines.push(`   ${i + 1}. [${x.score}分] ${x.chunk.id} ← ${x.chunk.source}`);
        });
      }

      return { lines, best: scored[0]?.chunk || null, poolSize: pool.length };
    }

    function appendMessage(html, isUser) {
      const wrap = document.createElement("div");
      wrap.className = "msg-in rounded-2xl px-4 py-3 text-sm leading-7 " +
        (isUser ? "bg-gray-950 text-white ml-8" : "bg-violet-50 text-gray-800 border border-violet-100 mr-4");
      wrap.innerHTML = html;
      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
    }

    function answer(question) {
      const q = question.trim();
      if (!q) return;

      appendMessage(`<span class="opacity-80">你问：</span>${q}`, true);

      const { lines, best, poolSize } = retrieve(q);
      logEl.textContent = lines.join("\n");

      if (!best) {
        if (poolSize === 0) {
          appendMessage(
            "未检索到适用于当前<strong>市场 + 玩家分层</strong>的外呼脚本（过滤后为空）。请检查名单标签或联系运营配置。",
            false
          );
        } else {
          appendMessage(
            "在适用脚本范围内未匹配到相关条目。建议换个问法，或让运营补充话术库；复杂支付问题请转客服队列。",
            false
          );
        }
        return;
      }

      let warning = "";
      if (!best.effective) {
        warning =
          '<p class="mt-2 text-amber-800 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 text-xs">⚠️ 命中<strong>已下线活动</strong>脚本。生产环境应默认屏蔽，避免对外承诺失效福利。</p>';
      }

      appendMessage(
        `<p class="font-semibold text-violet-900 mb-2">外呼要点（基于 Top1 脚本）</p>
         <p>${best.answer}</p>
         <p class="mt-3 text-xs text-gray-500">引用：${best.source}</p>
         ${warning}`,
        false
      );
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const q = questionEl.value;
      questionEl.value = "";
      answer(q);
    });

    document.querySelectorAll(".quick-q").forEach((btn) => {
      btn.addEventListener("click", () => answer(btn.dataset.q));
    });

    document.getElementById("clear-chat").addEventListener("click", () => {
      chat.innerHTML = `<div class="msg-in rounded-2xl bg-gray-100 px-4 py-3 text-sm text-gray-700 leading-7">对话已清空。请确认左侧筛选条件后重新提问。</div>`;
      logEl.textContent = "等待提问…";
    });

    document.getElementById("copy-log-btn").addEventListener("click", async () => {
      try { await navigator.clipboard.writeText(logEl.textContent); alert("检索日志已复制"); }
      catch { prompt("复制日志：", logEl.textContent); }
    });

    document.getElementById("compare-region").addEventListener("click", async () => {
      const q = "7天未登录怎么召回？";
      regionEl.value = "SEA";
      jobTypeEl.value = "churn7";
      document.querySelector('input[name="versionMode"][value="current"]').checked = true;
      updateFilterSummary();
      savePrefs();
      appendMessage('<p class="text-xs font-bold text-amber-800">对比实验 · 同一召回意图，切换市场</p>', false);
      answer(q);
      await new Promise((r) => setTimeout(r, 400));
      regionEl.value = "LATAM";
      updateFilterSummary();
      savePrefs();
      answer(q);
    });
  </script>
</body>
</html>
