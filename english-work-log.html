<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English 周练 · 在线写</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, "PingFang SC", sans-serif; }
    .page-wrap { width: 100%; max-width: 36rem; margin: 0 auto; padding: 0 1rem; }
    @media (min-width: 768px) { .page-wrap { max-width: 48rem; padding: 0 1.5rem; } }
    @media (min-width: 1024px) { .page-wrap { max-width: 56rem; } }
    textarea { min-height: 8rem; resize: vertical; }
    @media (min-width: 768px) { textarea { min-height: 10rem; } }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-16">

  <header class="bg-white border-b border-slate-200 sticky top-0 z-10 py-3 px-4">
    <div class="page-wrap flex justify-between items-center gap-3">
      <a href="homework.html" class="text-sm text-indigo-600 shrink-0">← 返回作业</a>
      <span class="text-xs text-slate-400">自动保存到本浏览器</span>
    </div>
  </header>

  <main class="page-wrap pt-6 md:pt-8">
    <h1 class="text-2xl md:text-3xl font-black">English 周练 · 直接在这里写</h1>
    <p class="mt-2 text-sm md:text-base text-slate-600 leading-7">
      不用打开 md 文件。写完点 <strong>复制交作业</strong> → 到 Cursor 粘贴发送 → 说「验收 English 周练」即可。
    </p>

    <div class="mt-6 grid gap-6 md:grid-cols-2">
      <section class="bg-white rounded-2xl border border-slate-200 p-4 md:p-5 shadow-sm">
        <label for="progress" class="block text-sm font-bold text-emerald-800">Progress · 本周进展（3～5 句英文）</label>
        <p class="mt-1 text-xs text-slate-500">例：This week I… / The main risk is… / Next step…</p>
        <textarea id="progress" class="mt-3 w-full rounded-xl border border-slate-200 p-3 text-sm leading-6 focus:ring-2 focus:ring-emerald-300 outline-none" placeholder="This week I finalized the payment FAQ split. The main risk is over-promise on payout questions. We set a stricter handoff threshold for payments. Next step is badcase review with ops."></textarea>
        <p id="progress-count" class="mt-1 text-[11px] text-slate-400"></p>
      </section>

      <section class="bg-white rounded-2xl border border-slate-200 p-4 md:p-5 shadow-sm">
        <label for="decision" class="block text-sm font-bold text-indigo-800">Decision · 一个决定（3～5 句英文）</label>
        <p class="mt-1 text-xs text-slate-500">例：We chose A over B because… / The tradeoff is…</p>
        <textarea id="decision" class="mt-3 w-full rounded-xl border border-slate-200 p-3 text-sm leading-6 focus:ring-2 focus:ring-indigo-300 outline-none" placeholder="We chose a higher threshold for payments over gameplay because payout errors cost more. The tradeoff is more handoffs in payment but fewer bad promises."></textarea>
        <p id="decision-count" class="mt-1 text-[11px] text-slate-400"></p>
      </section>
    </div>

    <section class="mt-6 bg-amber-50 border border-amber-200 rounded-2xl p-4 md:p-5">
      <p class="text-sm font-bold text-amber-900">口播（可选，做完打勾）</p>
      <ul class="mt-3 space-y-2 text-sm text-amber-950">
        <li><label class="flex items-start gap-2 cursor-pointer"><input type="checkbox" id="chk-st" class="mt-1" /> <span><a href="star-stories.html#story-a" class="text-indigo-700 underline font-semibold">Story A 中英文对照</a> · 念 S 和 T 各 2 遍</span></label></li>
        <li><label class="flex items-start gap-2 cursor-pointer"><input type="checkbox" id="chk-listen" class="mt-1" /> 听英文 PM 10 分钟（播客 / YouTube 开字幕）</label></li>
      </ul>
    </section>

    <div class="mt-8 flex flex-col sm:flex-row gap-3">
      <button type="button" id="btn-submit" class="flex-1 text-sm font-bold bg-rose-600 text-white py-4 rounded-xl hover:bg-rose-700 shadow-md">
        复制交作业 → 去 Cursor 粘贴
      </button>
      <button type="button" id="btn-download" class="text-sm font-semibold border border-slate-300 bg-white py-4 px-5 rounded-xl hover:bg-slate-50">
        下载备份 .txt
      </button>
    </div>

    <p id="saved-hint" class="mt-3 text-center text-xs text-emerald-600 hidden">✓ 已自动保存</p>
    <p class="mt-4 text-xs text-slate-400 text-center leading-6">
      Cursor 里发送后，我会打分并把内容写进 <code class="bg-slate-100 px-1 rounded">english-work-log.md</code> 存档。<br>
      也可以直接发一句：<strong>验收 English 周练，我网页写好了</strong>
    </p>
  </main>

  <p id="toast" class="fixed top-16 inset-x-4 mx-auto max-w-md text-center bg-slate-900 text-white text-sm px-4 py-3 rounded-2xl hidden z-20 shadow-lg"></p>

  <script>
    const KEY = "ada-english-work-log-v1";
    const progressEl = document.getElementById("progress");
    const decisionEl = document.getElementById("decision");
    const chkSt = document.getElementById("chk-st");
    const chkListen = document.getElementById("chk-listen");

    function load() {
      try {
        const d = JSON.parse(localStorage.getItem(KEY) || "{}");
        if (d.progress) progressEl.value = d.progress;
        if (d.decision) decisionEl.value = d.decision;
        if (d.chkSt) chkSt.checked = d.chkSt;
        if (d.chkListen) chkListen.checked = d.chkListen;
      } catch (_) {}
      updateCounts();
    }

    function save() {
      localStorage.setItem(KEY, JSON.stringify({
        progress: progressEl.value,
        decision: decisionEl.value,
        chkSt: chkSt.checked,
        chkListen: chkListen.checked,
        savedAt: new Date().toISOString()
      }));
      const hint = document.getElementById("saved-hint");
      hint.classList.remove("hidden");
      clearTimeout(save._t);
      save._t = setTimeout(() => hint.classList.add("hidden"), 1500);
    }

    function countSentences(text) {
      const parts = text.trim().split(/[.!?]+/).filter((s) => s.trim().length > 3);
      return parts.length;
    }

    function updateCounts() {
      document.getElementById("progress-count").textContent =
        progressEl.value.trim() ? "约 " + countSentences(progressEl.value) + " 句" : "";
      document.getElementById("decision-count").textContent =
        decisionEl.value.trim() ? "约 " + countSentences(decisionEl.value) + " 句" : "";
    }

    function buildSubmitText() {
      const lines = [
        "验收 English 周练",
        "",
        "【Progress】",
        progressEl.value.trim() || "（未写）",
        "",
        "【Decision】",
        decisionEl.value.trim() || "（未写）",
        "",
        "【口播/听】",
        "S+T 念 2 遍：" + (chkSt.checked ? "已完成" : "未完成"),
        "听 10 min：" + (chkListen.checked ? "已完成" : "未完成")
      ];
      return lines.join("\n");
    }

    async function copyText(text) {
      try { await navigator.clipboard.writeText(text); } catch {
        const ta = document.createElement("textarea");
        ta.value = text; document.body.appendChild(ta); ta.select();
        document.execCommand("copy"); ta.remove();
      }
      const toast = document.getElementById("toast");
      toast.textContent = "已复制！打开 Cursor → 粘贴 → 回车发送";
      toast.classList.remove("hidden");
      setTimeout(() => toast.classList.add("hidden"), 3500);
    }

    [progressEl, decisionEl].forEach((el) => {
      el.addEventListener("input", () => { save(); updateCounts(); });
    });
    [chkSt, chkListen].forEach((el) => el.addEventListener("change", save));

    document.getElementById("btn-submit").addEventListener("click", () => {
      if (!progressEl.value.trim() && !decisionEl.value.trim()) {
        alert("先写一点 Progress 或 Decision 再交哦");
        return;
      }
      save();
      copyText(buildSubmitText());
    });

    document.getElementById("btn-download").addEventListener("click", () => {
      const blob = new Blob([buildSubmitText()], { type: "text/plain;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "english-work-log-" + new Date().toISOString().slice(0, 10) + ".txt";
      a.click();
      URL.revokeObjectURL(a.href);
    });

    load();
  </script>
</body>
</html>
