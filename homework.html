<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>本周作业 · Ada</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, "PingFang SC", sans-serif; }
    .step-card { border-left: 3px solid #e2e8f0; padding-left: 1rem; }
    .step-card.active { border-left-color: #f43f5e; }
    .step-card.done { border-left-color: #10b981; opacity: .85; }
    #focus-prompt { white-space: pre-line; }
    .page-wrap { width: 100%; max-width: 36rem; margin-left: auto; margin-right: auto; padding-left: 1rem; padding-right: 1rem; }
    @media (min-width: 768px) {
      .page-wrap { max-width: 48rem; padding-left: 1.5rem; padding-right: 1.5rem; }
    }
    @media (min-width: 1024px) {
      .page-wrap { max-width: 64rem; }
      .homework-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: start; }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-8">

  <header class="bg-white border-b border-slate-200 px-4 py-3 sticky top-0 z-10">
    <div class="page-wrap flex justify-between items-center">
      <a href="career.html" class="text-sm text-indigo-600">← 成长中心</a>
      <span id="week-label" class="text-xs text-slate-400 text-right"></span>
    </div>
    <div id="progress-wrap" class="page-wrap mt-2 hidden">
      <div class="flex justify-between text-[11px] text-slate-500 mb-1">
        <span id="progress-text"></span>
        <span id="deadline-text"></span>
      </div>
      <div class="h-1.5 bg-slate-100 rounded-full overflow-hidden">
        <div id="progress-bar" class="h-full bg-emerald-500 rounded-full" style="width:0"></div>
      </div>
    </div>
  </header>

  <main class="page-wrap pt-5 md:pt-8 pb-12">

    <div class="mb-6 bg-indigo-50 border border-indigo-200 rounded-2xl p-4 md:p-5">
      <p class="text-xs font-bold text-indigo-800">📌 作业入口（电脑 / 手机自适应）</p>
      <p class="mt-2 text-sm md:text-base text-indigo-950 leading-7">
        ① 左边黄框看题 → ② 打开在线写作页写 → ③ 复制交作业到 Cursor
      </p>
    </div>

    <section id="focus-block" class="hidden homework-grid">
      <div>
      <p class="text-xs font-bold text-rose-600">当前任务</p>
      <h1 id="focus-title" class="mt-1 text-xl md:text-2xl font-black leading-snug"></h1>

      <div class="mt-4 bg-amber-50 border border-amber-200 rounded-2xl p-4 md:p-5">
        <p class="text-[11px] font-bold text-amber-700 uppercase tracking-wide">题目</p>
        <p id="focus-prompt" class="mt-2 text-sm md:text-base text-amber-950 leading-7"></p>
        <p id="focus-vocab" class="mt-3 text-xs text-amber-800 leading-5 hidden"></p>
      </div>

      <p id="focus-time" class="mt-3 text-xs md:text-sm text-slate-400"></p>
      </div>

      <div>
      <div class="mt-0 space-y-5">

        <!-- Step 1 · 写 -->
        <div class="step-card active">
          <p class="text-xs font-bold text-rose-600">第 1 步 · 写作业</p>
          <p class="mt-1 text-sm text-slate-600 leading-6">对照左边黄框题目，在<strong>在线写作页</strong>里写（自动保存，不用 md）。</p>
          <p id="step2-hint" class="mt-2 text-xs text-slate-500 hidden"></p>
          <a id="btn-write-page" href="english-work-log.html" class="mt-4 flex w-full text-center justify-center text-sm font-bold bg-indigo-600 text-white py-4 rounded-xl hover:bg-indigo-700 shadow-md">
            打开在线写作页 →
          </a>
          <a id="step1-read-extra" href="#" class="hidden mt-3 block text-xs font-semibold text-indigo-600 underline text-center"></a>
          <p id="step2-skip" class="hidden mt-2 text-xs text-slate-400 text-center">这项不用在线写，做完直接第 2 步。</p>
        </div>

        <!-- Step 2 · 交 -->
        <div class="step-card">
          <p class="text-xs font-bold text-emerald-700">第 2 步 · 交作业</p>
          <p class="mt-1 text-sm text-slate-600">写完后点下面 → Cursor 粘贴 → 回车 → 等打分</p>
          <button type="button" id="btn-submit" class="mt-4 w-full text-sm font-bold bg-rose-600 text-white py-4 rounded-xl hover:bg-rose-700 shadow-md">
            复制交作业 → 去 Cursor 粘贴
          </button>
          <p id="cmd-preview" class="mt-2 text-center text-xs text-slate-500 font-mono"></p>
        </div>
      </div>
      </div>
    </section>

    <section id="done-block" class="hidden text-center py-16">
      <p class="text-4xl">🎉</p>
      <p class="mt-3 text-xl font-black">本周主线完成</p>
    </section>

    <div class="mt-8 space-y-2">
      <details id="next-details" class="hidden bg-white rounded-xl px-4 py-3 border border-slate-200">
        <summary class="text-sm font-medium text-slate-600 cursor-pointer">下一项：<span id="next-summary"></span></summary>
        <p id="next-preview" class="mt-2 text-xs text-slate-500 leading-5"></p>
      </details>

      <details class="bg-white rounded-xl px-4 py-3 border border-slate-200">
        <summary class="text-sm font-medium text-slate-600 cursor-pointer">已完成 / 可选项</summary>
        <ul id="done-list" class="mt-2 space-y-1 text-sm text-slate-500"></ul>
        <ul id="optional-list" class="mt-2 space-y-1 text-sm text-slate-400"></ul>
      </details>
    </div>
  </main>

  <p id="toast" class="fixed top-20 inset-x-4 mx-auto max-w-sm text-center bg-slate-900 text-white text-sm px-4 py-3 rounded-2xl hidden z-20 shadow-lg leading-6"></p>

  <script>
    const BASE = location.pathname.replace(/\/[^/]*$/, "/");

    function esc(s) {
      return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;");
    }

    function isMainline(t) { return !t.optional; }

    function showFocus(t) {
      document.getElementById("focus-block").classList.remove("hidden");
      document.getElementById("focus-title").textContent = t.title;
      document.getElementById("focus-prompt").textContent = t.prompt || t.what || "";
      document.getElementById("focus-time").textContent = t.minutes ? "约 " + t.minutes + " 分钟 · " + (t.write_hint || "") : (t.write_hint || "");

      const vocabEl = document.getElementById("focus-vocab");
      if (t.vocab && t.vocab.length) {
        vocabEl.textContent = "必背词：" + t.vocab.join(" · ");
        vocabEl.classList.remove("hidden");
      } else {
        vocabEl.classList.add("hidden");
      }

      const writeBtn = document.getElementById("btn-write-page");
      const readExtra = document.getElementById("step1-read-extra");
      const skipHint = document.getElementById("step2-skip");
      const hintEl = document.getElementById("step2-hint");

      if (t.write_hint) {
        hintEl.textContent = t.write_hint;
        hintEl.classList.remove("hidden");
      } else {
        hintEl.classList.add("hidden");
      }

      if (t.read) {
        writeBtn.href = t.read;
        writeBtn.textContent = (t.read_label || "打开在线写作页").replace(/→\s*$/, "").trim() + " →";
        writeBtn.classList.remove("hidden");
        skipHint.classList.add("hidden");
        if (t.read.includes("star-stories")) {
          readExtra.href = t.read;
          readExtra.textContent = "口播材料：" + (t.read_label || t.read);
          readExtra.classList.remove("hidden");
        } else if (t.prompt && t.prompt.includes("Story A")) {
          readExtra.href = "star-stories.html#story-a";
          readExtra.textContent = "口播材料：Story A 中英文对照";
          readExtra.classList.remove("hidden");
        } else {
          readExtra.classList.add("hidden");
        }
      } else {
        writeBtn.classList.add("hidden");
        skipHint.classList.remove("hidden");
        readExtra.classList.add("hidden");
      }

      document.getElementById("btn-submit").dataset.cmd = t.cmd;
      document.getElementById("cmd-preview").textContent = "「" + t.cmd + "」";
    }

    async function loadHomework() {
      let data;
      try {
        const r = await fetch(BASE + "homework-latest.json?t=" + Date.now());
        if (!r.ok) throw new Error("missing");
        data = await r.json();
      } catch {
        document.getElementById("focus-block").classList.remove("hidden");
        document.getElementById("week-label").textContent = "第 2 周 · 补交";
        document.getElementById("focus-title").textContent = "English 工作语言 · 周练";
        document.getElementById("focus-prompt").textContent =
          "① 打开 english-work-log.html 在线写 Progress 和 Decision 各 3～5 句\n" +
          "② star-stories 中英文对照，念 Story A 的 S+T 各 2 遍\n" +
          "③ 听英文 PM 10 分钟\n" +
          "④ 回 Cursor 说：验收 English 周练";
        document.getElementById("focus-time").textContent = "约 35 分钟 · 端午前收工";
        document.getElementById("step2-hint").textContent = "对照左边黄框，在在线写作页写。";
        document.getElementById("btn-write-page").href = "english-work-log.html";
        document.getElementById("btn-write-page").classList.remove("hidden");
        document.getElementById("step2-skip").classList.add("hidden");
        document.getElementById("step1-read-extra").href = "star-stories.html#story-a";
        document.getElementById("step1-read-extra").textContent = "口播材料：Story A 中英文对照";
        document.getElementById("step1-read-extra").classList.remove("hidden");
        document.getElementById("btn-submit").dataset.cmd = "验收 English 周练";
        document.getElementById("cmd-preview").textContent = "「验收 English 周练」";
        return;
      }

      document.getElementById("week-label").textContent = data.week || "";
      document.getElementById("deadline-text").textContent = data.deadline || "";

      const all = data.tasks || [];
      const done = all.filter((t) => t.status === "done");
      const pending = all.filter((t) => t.status !== "done");
      const mainPending = pending.filter(isMainline);
      const optionalPending = pending.filter((t) => t.optional);
      const mainAll = all.filter(isMainline);
      const mainDone = mainAll.filter((t) => t.status === "done");
      const next = mainPending[0] || optionalPending[0];

      if (mainAll.length) {
        document.getElementById("progress-wrap").classList.remove("hidden");
        const pct = Math.round((mainDone.length / mainAll.length) * 100);
        document.getElementById("progress-bar").style.width = pct + "%";
        document.getElementById("progress-text").textContent = "主线 " + mainDone.length + "/" + mainAll.length;
      }

      if (!next) {
        document.getElementById("done-block").classList.remove("hidden");
        document.getElementById("progress-bar").style.width = "100%";
      } else {
        showFocus(next);
        const rest = mainPending.filter((t) => t.id !== next.id);
        if (rest[0]) {
          document.getElementById("next-details").classList.remove("hidden");
          document.getElementById("next-summary").textContent = rest[0].title;
          document.getElementById("next-preview").textContent = rest[0].prompt || "";
        }
      }

      document.getElementById("done-list").innerHTML = done.map((t) =>
        `<li>✓ ${esc(t.title)} <span class="text-emerald-600">${esc(t.score || "")}</span></li>`
      ).join("") || "";

      document.getElementById("optional-list").innerHTML = optionalPending.map((t) =>
        `<li>○ ${esc(t.title)}（可选）</li>`
      ).join("");
    }

    async function copyText(text, msg) {
      if (!text) return;
      try { await navigator.clipboard.writeText(text); } catch {
        const ta = document.createElement("textarea");
        ta.value = text; document.body.appendChild(ta); ta.select();
        document.execCommand("copy"); ta.remove();
      }
      const toast = document.getElementById("toast");
      toast.textContent = msg || ("已复制「" + text + "」");
      toast.classList.remove("hidden");
      setTimeout(() => toast.classList.add("hidden"), 3000);
    }

    document.getElementById("btn-submit").addEventListener("click", (e) => {
      copyText(e.currentTarget.dataset.cmd, "已复制 → 打开 Cursor → 粘贴 → 回车交作业");
    });

    loadHomework();
  </script>
</body>
</html>
