    function esc(s) {
      return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function renderBlock(b) {
      switch (b.t) {
        case "meta":
          return `<dl class="meta-grid">${b.rows.map(([k, v]) => `<dt>${esc(k)}</dt><dd>${v}</dd>`).join("")}</dl>`;
        case "html":
          return b.html;
        case "callout":
          return `<div class="callout ${b.kind || ""}">${b.html}</div>`;
        case "decision":
          return `<div class="decision"><strong>${esc(b.title)}</strong><p>${b.body}</p></div>`;
        case "scenario":
          return `<div class="scenario"><div class="label">Scenario</div><h3>${esc(b.title)}</h3>${b.body}</div>`;
        case "changelog":
          return `<h2>修订记录</h2><ul class="compact changelog">${b.items.map((i) => `<li>${esc(i)}</li>`).join("")}</ul>`;
        default:
          return "";
      }
    }

    function renderArticle(p) {
      const links = (p.demo || [])
        .map((d) => `<a href="${d.h}" class="demo-link no-print" style="color:${p.accent}">${d.t} →</a>`)
        .join('<span class="text-zinc-300 mx-2">|</span>');
      return `<article id="prd-${p.id}" class="doc rounded-lg p-6 md:p-10 scroll-mt-20">
        <p class="text-xs font-medium text-zinc-400">PRD · 海外游戏 · 脱敏</p>
        <h1 class="text-xl md:text-2xl font-bold text-zinc-900 mt-2 leading-snug">${p.title}</h1>
        ${links ? `<p class="mt-4 no-print">${links}</p>` : ""}
        <div class="mt-6">${p.blocks.map(renderBlock).join("")}</div>
      </article>`;
    }

    function render() {
      const focus = Number(new URLSearchParams(location.search).get("p")) || 0;
      document.getElementById("nav").innerHTML = PRDS.map(
        (p) =>
          `<a href="prd.html?p=${p.id}" class="nav-link block px-3 py-2 rounded text-zinc-600 hover:bg-zinc-100 ${focus === p.id ? "active" : ""}">${p.nav}</a>`
      ).join("");
      document.getElementById("content").innerHTML = PRDS.map(renderArticle).join("");
      if (focus) {
        const el = document.getElementById("prd-" + focus);
        if (el) setTimeout(() => el.scrollIntoView({ behavior: "smooth" }), 80);
      }
    }
    render();
  </script>
</body>
</html>
